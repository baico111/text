name: Zeabur Factory Test & Auto Renew

on:
  workflow_dispatch:      # 允许手动点击运行

jobs:
  renew-task:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 一次性安装所有核心依赖 (适配 Ubuntu 24.04)
        run: |
          # 1. 安装脚本中 import 的所有 Python 库
          pip install seleniumbase requests httpx
          
          # 2. 安装 SeleniumBase 运行所需的 ChromeDriver
          seleniumbase install chromedriver
          
          # 3. 针对 Ubuntu 24.04 (Noble) 补全浏览器运行环境
          # 解决了 libasound2 找不到的问题，并增加了所有 SeleniumBase 必需的系统库
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libgbm1 \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libu2f-udev \
            libvulkan1 \
            fonts-liberation \
            xdg-utils

      - name: 执行本地触发与远程接力
        env:
          # --- 确保 Secrets 已在 GitHub 仓库中配置 ---
          ZEABUR_AI_URL: ${{ secrets.ZEABUR_AI_URL }}
          HOSTUUID: ${{ secrets.HOSTUUID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: |
          # 运行你的精修判定闭环脚本
          python test_factory.py

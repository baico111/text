name: Zeabur Factory Test & Auto Renew

on:
  workflow_dispatch:      # 允许手动点击运行
  schedule:
    - cron: '0 2 * * *'    # 每天北京时间上午 10:00 自动运行

jobs:
  renew-task:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 SeleniumBase 及核心依赖
        run: |
          # 1. 安装基础库
          pip install seleniumbase requests httpx
          # 2. 【关键】安装浏览器驱动
          seleniumbase install chromedriver
          # 3. 安装 Linux 系统必要的运行库 (解决浏览器启动失败)
          sudo apt-get update
          sudo apt-get install -y libnss3 libgbm1 libasound2

      - name: 执行本地触发与远程接力
        env:
          ZEABUR_AI_URL: ${{ secrets.ZEABUR_AI_URL }}
          HOSTUUID: ${{ secrets.HOSTUUID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: |
          # 运行你那套精修判定闭环脚本
          python test_factory.py

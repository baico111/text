name: Zeabur Factory Test & Auto Renew

on:
  workflow_dispatch:      # 允许手动点击运行
  schedule:
    - cron: '0 2 * * *'    # 每天北京时间上午 10:00 自动运行 (UTC 2:00)

jobs:
  renew-task:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装极简依赖
        run: |
          # 现在的脚本只需要 requests 即可，不需要安装庞大的浏览器环境
          pip install requests

      - name: 执行远程穿透测试
        env:
          # --- 核心对接变量 ---
          ZEABUR_AI_URL: ${{ secrets.ZEABUR_AI_URL }}
          HOSTUUID: ${{ secrets.HOSTUUID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: |
          # 运行我们刚刚精简过的远程指令脚本
          python test_factory.py

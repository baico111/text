name: Zeabur Factory Test & Auto Renew

on:
  workflow_dispatch:      # 允许手动点击运行
  schedule:
    - cron: '0 2 * * *'    # 每天北京时间上午 10:00 自动运行

jobs:
  renew-task:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装核心依赖 (Playwright + Requests + HTTPX)
        run: |
          # 1. 同时安装同步请求库 requests 和 异步库 httpx/playwright
          pip install playwright httpx requests
          # 2. 安装 Chromium 浏览器内核
          python -m playwright install chromium
          # 3. 安装 Linux 系统必要的运行库
          python -m playwright install-deps chromium

      - name: 执行本地触发与远程接力
        env:
          ZEABUR_AI_URL: ${{ secrets.ZEABUR_AI_URL }}
          HOSTUUID: ${{ secrets.HOSTUUID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: |
          # 运行脚本
          python test_factory.py
